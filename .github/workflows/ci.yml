name: Python DevOps CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-and-test:
    name: Build & Run Unit Tests
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Checkout mã nguồn của dự án
    - name: Checkout repository
      uses: actions/checkout@v4

    # Bước 2: Cài đặt phiên bản Python 3.10
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Tự động cache các thư viện để tối ưu tốc độ chạy CI

    # Bước 3: Cài đặt các thư viện từ requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Bước 4: Chạy Unit Test kiểm thử phép tính multiply
    - name: Run Unit Tests
      run: |
        python -m unittest discover -s tests -v
