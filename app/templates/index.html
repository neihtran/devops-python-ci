<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Multiply App - Premium Calculator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .glow-button {
            position: relative;
            transition: all 0.3s ease;
        }
        .glow-button::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            border-radius: 0.5rem;
            z-index: -1;
            opacity: 0;
            filter: blur(8px);
            transition: opacity 0.3s ease;
        }
        .glow-button:hover::after {
            opacity: 1;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 text-slate-100 overflow-x-hidden font-sans">
    
    <!-- Background elements -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl animate-float"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-fuchsia-600/10 rounded-full blur-3xl animate-float" style="animation-delay: -3s;"></div>

    <div class="w-full max-w-md glass rounded-2xl p-8 z-10">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-indigo-500 to-purple-600 shadow-lg shadow-indigo-500/30 mb-4 animate-bounce">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-200 via-purple-300 to-pink-200 bg-clip-text text-transparent">
                DevOps Multiply App
            </h1>
            <p class="text-xs text-slate-400 mt-2 uppercase tracking-widest font-semibold">Bài Thực Hành Số 1</p>
        </div>

        <!-- Calculator Form -->
        <div class="space-y-6">
            <div>
                <label for="num_a" class="block text-sm font-medium text-slate-300 mb-2">Số thứ nhất (a)</label>
                <input type="number" id="num_a" value="3" step="any"
                    class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700/50 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-white placeholder-slate-500 transition-all font-semibold"
                    placeholder="Nhập số a">
            </div>

            <div class="relative flex justify-center my-2">
                <div class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-indigo-400 font-bold text-lg shadow-md">
                    ×
                </div>
            </div>

            <div>
                <label for="num_b" class="block text-sm font-medium text-slate-300 mb-2">Số thứ hai (b)</label>
                <input type="number" id="num_b" value="4" step="any"
                    class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700/50 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-white placeholder-slate-500 transition-all font-semibold"
                    placeholder="Nhập số b">
            </div>

            <button id="btn-multiply"
                class="glow-button w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5 active:translate-y-0 text-center uppercase tracking-wider text-sm">
                Tính Kết Quả
            </button>
        </div>

        <!-- Result Display -->
        <div class="mt-8 pt-6 border-t border-slate-800">
            <div id="result-container" class="hidden transition-all duration-300">
                <div class="bg-indigo-950/40 border border-indigo-500/20 rounded-xl p-4 text-center">
                    <span class="text-xs text-indigo-400 uppercase tracking-widest font-semibold block mb-1">Kết quả phép nhân</span>
                    <span id="result-expression" class="text-sm text-slate-400 block mb-1">3 × 4 =</span>
                    <span id="result-val" class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-green-300 to-emerald-400">12</span>
                </div>
            </div>
            
            <div id="error-container" class="hidden transition-all duration-300">
                <div class="bg-rose-950/40 border border-rose-500/20 rounded-xl p-4 text-center text-rose-400 text-sm">
                    Có lỗi xảy ra. Vui lòng kiểm tra lại dữ liệu nhập vào!
                </div>
            </div>
        </div>

        <!-- System info -->
        <div class="mt-6 text-center text-xs text-slate-500">
            <span>Containerized with Docker • CI with GitHub Actions</span>
        </div>
    </div>

    <!-- Script for calculations -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const numA = document.getElementById('num_a');
            const numB = document.getElementById('num_b');
            const btnMultiply = document.getElementById('btn-multiply');
            const resultContainer = document.getElementById('result-container');
            const errorContainer = document.getElementById('error-container');
            const resultExpression = document.getElementById('result-expression');
            const resultVal = document.getElementById('result-val');

            async function performCalculation() {
                const valA = parseFloat(numA.value);
                const valB = parseFloat(numB.value);

                if (isNaN(valA) || isNaN(valB)) {
                    errorContainer.classList.remove('hidden');
                    resultContainer.classList.add('hidden');
                    return;
                }

                try {
                    btnMultiply.disabled = true;
                    btnMultiply.innerText = 'Đang tính toán...';
                    
                    const response = await fetch(`/api/multiply?a=${valA}&b=${valB}`);
                    const data = await response.json();

                    if (response.ok) {
                        resultExpression.textContent = `${valA} × ${valB} =`;
                        resultVal.textContent = data.result;
                        resultContainer.classList.remove('hidden');
                        errorContainer.classList.add('hidden');
                    } else {
                        throw new Error(data.error || 'Server error');
                    }
                } catch (err) {
                    console.error(err);
                    errorContainer.classList.remove('hidden');
                    resultContainer.classList.add('hidden');
                } finally {
                    btnMultiply.disabled = false;
                    btnMultiply.innerText = 'Tính Kết Quả';
                }
            }

            btnMultiply.addEventListener('click', performCalculation);
            
            // Tự động chạy tính toán ban đầu (3 x 4)
            performCalculation();
        });
    </script>
</body>
</html>
